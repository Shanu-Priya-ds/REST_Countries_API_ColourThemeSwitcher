<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country</title>
    <!--For loading icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    
    <script type="module" defer src="./dist/main.js"></script>
</head>

<body>
    <header>
        <nav>
            <h1>Where in the world?</h1>
            <!-- <i class="fa-thin fa-moon"></i> -->
            <!-- <wa-icon name="face-awesome" variant="light" label="Awesome" style="font-size: 2em;"></wa-icon> -->
            <!-- <i class="fa-solid fa-moon"></i> -->
           <i id="moon_icon" class="fa-regular fa-moon"></i>
            <span aria-label="Dark Mode">Dark Mode</span>
        </nav>
    </header>
    <main class="main" id="main">
        <div id="searchFilter">
        <div id="search-container">
            <i class="fa-solid fa-magnifying-glass icon"></i>
            <input type="text" id="search-country" name="search" placeholder="Serach for Country"/>
        </div>
        <select id="regionDropDown" aria-placeholder="Filter by Region">
            <option value="" selected hidden>Filter by Region</option>
            <option value="All">All Region</option>
            <option value="Africa">Africa</option>
            <option value="Americas">Americas</option>
            <option value="Asia">Asia</option>
            <option value="Europe">Europe</option>
            <option value="Oceania">Oceania</option>
        </select>
        </div>
        <div id="countries"> <!--Add the country details programatically based on the API response-->
        </div>
    </main>
</body>

</html>
